<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASCII 360p Stream Demo</title>

<style>
  body {
    margin: 0;
    background: black;
    color: #00ff9d;
    font-family: monospace;
    overflow: hidden;
  }

  #screen {
    white-space: pre;
    font-size: 6px;
    line-height: 6px;
    letter-spacing: 1px;
  }

  #status {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 12px;
    opacity: 0.7;
  }

  video, canvas {
    display: none;
  }
</style>
</head>

<body>

<div id="status">Initializing stream...</div>
<pre id="screen"></pre>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const screen = document.getElementById("screen");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const status = document.getElementById("status");

const WIDTH = 120;   // ASCII width
const HEIGHT = 67;   // ASCII height (~360p aspect)
const CHARS = " .:-=+*#%@";

canvas.width = WIDTH;
canvas.height = HEIGHT;

let fallback = false;

// Convert brightness to ASCII
function toASCII(imageData) {
  const data = imageData.data;
  let output = "";

  for (let y = 0; y < HEIGHT; y++) {
    let row = "";
    for (let x = 0; x < WIDTH; x++) {
      const i = (y * WIDTH + x) * 4;
      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];

      const gray = (r + g + b) / 3;
      const index = Math.floor((gray / 255) * (CHARS.length - 1));

      row += CHARS[index];
    }
    output += row + "\n";
  }

  return output;
}

// Webcam stream
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 480, height: 270 },
      audio: false
    });

    video.srcObject = stream;
    status.textContent = "Live camera ASCII stream running";
    requestAnimationFrame(loop);

  } catch (e) {
    fallback = true;
    status.textContent = "Camera blocked → running demo animation";
    requestAnimationFrame(fakeLoop);
  }
}

// Real camera loop
function loop() {
  ctx.drawImage(video, 0, 0, WIDTH, HEIGHT);
  const frame = ctx.getImageData(0, 0, WIDTH, HEIGHT);
  screen.textContent = toASCII(frame);
  requestAnimationFrame(loop);
}

// Fallback animation if camera denied
let t = 0;
function fakeLoop() {
  const imageData = ctx.createImageData(WIDTH, HEIGHT);

  for (let y = 0; y < HEIGHT; y++) {
    for (let x = 0; x < WIDTH; x++) {
      const i = (y * WIDTH + x) * 4;

      const v =
        Math.sin(x * 0.1 + t) * 127 +
        Math.cos(y * 0.1 + t) * 127;

      imageData.data[i] = v;
      imageData.data[i + 1] = v;
      imageData.data[i + 2] = v;
      imageData.data[i + 3] = 255;
    }
  }

  t += 0.05;

  screen.textContent = toASCII(imageData);
  requestAnimationFrame(fakeLoop);
}

startCamera();
</script>

</body>
</html>
